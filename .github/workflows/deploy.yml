name: Deploy to Vercel

# Vercel's native GitHub integration handles production deploys automatically
# on every push to main. This workflow exists only as a manual fallback trigger
# and to document the deployment pipeline.
#
# Setup (one-time):
#   1. Go to vercel.com/new
#   2. Import the "runowl-website" GitHub repo
#   3. Set environment variables in Vercel dashboard:
#        PUBLIC_SUPABASE_URL      = https://elvtpknnutnicjxmlgfu.supabase.co
#        PUBLIC_SUPABASE_ANON_KEY = <your anon key>
#   4. Vercel will auto-deploy on every push to main — no secrets needed here.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    name: Build verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build
        env:
          NODE_VERSION: 22
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
