<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon-32x32.png?v=2"
			type="image/png"
			sizes="32x32"
		/>
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon-16x16.png?v=2"
			type="image/png"
			sizes="16x16"
		/>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg?v=2" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png?v=2" />
		<meta name="theme-color" content="#0a0a0f" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				const theme = localStorage.getItem('theme') || 'dark';
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
